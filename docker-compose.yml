services:
  api:
    image: registry.gitlab.com/sebastiano.debertoldi/SAMT3D/SAMT3D-api:latest
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: registry.gitlab.com/sebastiano.debertoldi/SAMT3D/SAMT3D-db:latest
    restart: always
    environment:
      - name=value
    volumes:
      - ./db_data/var/lib/mysql